services:
  - type: web
    name: job-portal-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        sync: false # You will provide this (e.g. MongoDB Atlas link) in Render UI
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure key
      - key: JWT_EXPIRE
        value: 30d


